global:
  scrape_interval: 10s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8889]

  - job_name: scoring-api
    metrics_path: /metrics
    static_configs:
      - targets: [scoring-api:8080]

  - job_name: agentic-orchestrator
    metrics_path: /metrics
    static_configs:
      - targets: [agentic-orchestrator:8090]
