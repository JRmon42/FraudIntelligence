$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineEndpoint.schema.json
name: fraud-intel-scoring
auth_mode: aml_token
description: Online endpoint for the FraudIntelligence ensemble fraud scorer.
tags:
  team: fraud-intel
  data_residency: sweden-central
traffic:
  blue: 90
  green: 10
---
$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json
name: blue
endpoint_name: fraud-intel-scoring
model: azureml:fraud-intel-ensemble@latest
code_configuration:
  code: ../
  scoring_script: ml/score.py
environment:
  conda_file: ../conda.yaml
  image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04:latest
instance_type: Standard_F4s_v2
instance_count: 3
request_settings:
  request_timeout_ms: 5000
  max_concurrent_requests_per_instance: 8
liveness_probe:
  initial_delay: 10
  period: 10
  timeout: 5
  failure_threshold: 3
readiness_probe:
  initial_delay: 10
  period: 10
  timeout: 5
  failure_threshold: 3
scale_settings:
  type: target_utilization
  target_utilization_percentage: 70
  min_instances: 3
  max_instances: 20
  polling_interval: 30
---
$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json
name: green
endpoint_name: fraud-intel-scoring
model: azureml:fraud-intel-ensemble@latest
code_configuration:
  code: ../
  scoring_script: ml/score.py
environment:
  conda_file: ../conda.yaml
  image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04:latest
instance_type: Standard_F4s_v2
instance_count: 1
request_settings:
  request_timeout_ms: 5000
  max_concurrent_requests_per_instance: 8
