name: docker-build

# Builds and pushes container images for every microservice to Azure Container Registry.
#
# OIDC federated credentials setup (one-time, on the App Registration backing AZURE_CLIENT_ID):
#
#   az ad app federated-credential create \
#     --id <APP_OBJECT_ID> \
#     --parameters '{
#       "name": "github-fraudintel-main",
#       "issuer": "https://token.actions.githubusercontent.com",
#       "subject": "repo:<ORG>/<REPO>:ref:refs/heads/main",
#       "audiences": ["api://AzureADTokenExchange"]
#     }'
#
# Then grant the service principal `AcrPush` on the registry:
#
#   az role assignment create \
#     --assignee <APP_CLIENT_ID> \
#     --role AcrPush \
#     --scope $(az acr show -n $ACR_NAME --query id -o tsv)
#
# Required GitHub secrets/vars: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, ACR_NAME.

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        service:
          - scoring-api
          - agentic-orchestrator
          - eba-reporter
          - transaction-simulator
          - feature-builder
    steps:
      - uses: actions/checkout@v4

      - name: Skip if no Dockerfile
        id: check
        run: |
          if [ -f services/${{ matrix.service }}/Dockerfile ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "::warning::services/${{ matrix.service }}/Dockerfile missing — skipping"
          fi

      - name: Azure login (OIDC)
        if: steps.check.outputs.build == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        if: steps.check.outputs.build == 'true'
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_NAME }}.azurecr.io/fraudintel/${{ matrix.service }}:${{ github.sha }}
            ${{ secrets.ACR_NAME }}.azurecr.io/fraudintel/${{ matrix.service }}:latest
          cache-from: type=registry,ref=${{ secrets.ACR_NAME }}.azurecr.io/fraudintel/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ secrets.ACR_NAME }}.azurecr.io/fraudintel/${{ matrix.service }}:buildcache,mode=max
