<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Heimdall">
  <title>Heimdall</title>
  <defs>
    <!-- Bifröst gradient: the rainbow bridge Heimdall guards -->
    <linearGradient id="bifrost" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#3DD6C4"/>
      <stop offset="50%" stop-color="#1F8FE5"/>
      <stop offset="100%" stop-color="#1F4E78"/>
    </linearGradient>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#EAF6FF"/>
      <stop offset="55%" stop-color="#1F8FE5"/>
      <stop offset="100%" stop-color="#0E2A47"/>
    </radialGradient>
  </defs>

  <!-- Shield (protection / banking-grade trust) -->
  <path d="M120 14
           L210 50
           V120
           C210 178 170 214 120 226
           C70 214 30 178 30 120
           V50 Z"
        fill="#0E2A47" stroke="url(#bifrost)" stroke-width="8" stroke-linejoin="round"/>

  <!-- Bifröst bridge arc across the shield -->
  <path d="M48 150 C 90 96, 150 96, 192 150"
        fill="none" stroke="url(#bifrost)" stroke-width="10" stroke-linecap="round" opacity="0.9"/>

  <!-- The all-seeing eye (vigilance / real-time scoring) -->
  <g transform="translate(120 116)">
    <path d="M-46 0 C -24 -30, 24 -30, 46 0 C 24 30, -24 30, -46 0 Z"
          fill="#0B2138" stroke="url(#bifrost)" stroke-width="5"/>
    <circle r="17" fill="url(#iris)"/>
    <circle r="7"  fill="#04111F"/>
    <circle cx="-5" cy="-5" r="3" fill="#EAF6FF"/>
  </g>
</svg>
